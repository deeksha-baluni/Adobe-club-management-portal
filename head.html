<meta
  http-equiv="Content-Security-Policy"
  content="script-src 'nonce-aem' 'strict-dynamic' 'unsafe-inline' http: https:; base-uri 'self'; object-src 'none';"
  move-to-http-header="true"
>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  /* Critical shell — keep in sync with styles/styles.css (body.appear / guest-index reveal) */
  body {
    display: none;
    margin: 0;
    overflow-x: clip;
    max-width: 100%;
    background-color: #fff;
    color: #2c2c2c;
    font-family: 'Adobe Clean', adobe-clean, 'Source Sans 3', source-sans-3-fallback, sans-serif;
    font-size: 18px;
    line-height: 1.6;
  }

  body.appear {
    display: block;
  }

  body.guest-index {
    display: block;
    visibility: hidden;
  }

  body.guest-index.appear {
    visibility: visible;
  }

  @font-face {
    font-family: source-sans-3-fallback;
    size-adjust: 104.5%;
    src: local('Arial');
  }

  /* Guest index CLS — reserve hero + marketing space before block JS (mirrored in block CSS) */
  html.guest-index-route .landing-hero-wrapper:has(.landing-hero:not(:has(.landing-hero-content))) {
    min-height: clamp(520px, 88vw, 680px);
  }

  html.guest-index-route .landing-hero.block:not(:has(.landing-hero-content)) {
    visibility: hidden;
    pointer-events: none;
  }

  html.guest-index-route .landing-hero.block:not(:has(.landing-hero-content)) > div {
    display: grid;
    grid-template-columns: 1fr;
    gap: clamp(16px, 2.5vw, 32px);
    box-sizing: border-box;
  }

  html.guest-index-route .landing-hero.block:not(:has(.landing-hero-content)) > div > div:first-child {
    aspect-ratio: 16 / 9;
    max-height: min(48vw, 260px);
    overflow: hidden;
    line-height: 0;
  }

  html.guest-index-route .landing-hero.block:not(:has(.landing-hero-content)) img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .cards.block:not(:has(.cards-grid)):not(:has(.steps-grid)):not(:has(.stories-grid)):not(:has(.lp-clubs-grid)):not(:has(.lp-events-grid)):not(:has(.club-cards-body)) {
    min-height: clamp(280px, 38vw, 400px);
    visibility: hidden;
    pointer-events: none;
  }

  .cards--showcase.block:not(:has(.cards-grid)) {
    min-height: clamp(480px, 58vw, 720px);
  }

  .cards--steps.block:not(:has(.step)) {
    min-height: clamp(220px, 32vw, 300px);
  }

  .cards--stories.block:not(:has(.story-card)) {
    min-height: clamp(360px, 52vw, 480px);
  }

  /* /home greeting — reserve space before decorateMain (limits CLS) */
  html.user-home-route .default-content-wrapper:has(p:first-child),
  html.user-home-route .default-content-wrapper:has(#home-greeting),
  html.user-home-route .default-content-wrapper:has([data-user-greeting]) {
    min-height: clamp(88px, 12vw, 120px);
  }

  html.user-home-route #home-greeting:not(.greeting-ready),
  html.user-home-route [data-user-greeting]:not(.greeting-ready) {
    visibility: hidden;
  }

  html.user-home-route #home-greeting,
  html.user-home-route [data-user-greeting] {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin: 0;
    padding: clamp(40px, 6vw, 64px) var(--section-padding-x, 40px) 0;
    border-bottom: 1px solid var(--color-border, #eaeaea);
    box-sizing: border-box;
  }

  /* /home poster cards — reserve grid space before block JS (limits CLS) */
  html.user-home-route .cards--poster.block:not(:has(.lp-clubs-grid, .lp-events-grid)) {
    min-height: clamp(420px, 52vw, 560px);
    visibility: hidden;
    pointer-events: none;
  }

  html.user-home-route .cards--home-clubs.block:not(:has(.lp-clubs-grid)) {
    min-height: clamp(520px, 62vw, 720px);
  }

  html.user-home-route .cards--home-events.block:not(:has(.lp-events-grid)) {
    min-height: clamp(480px, 58vw, 640px);
  }

  /* Admin /home — hide member dashboard before block JS runs */
  html.admin-home-route main > .section:has(.cards, .home-calendar, .section-head, .cta-banner):not(:has(.admin-dashboard)) {
    display: none;
  }

  @media (min-width: 900px) {
    html.guest-index-route .landing-hero-wrapper:has(.landing-hero:not(:has(.landing-hero-content))) {
      min-height: clamp(380px, 38vw, 500px);
    }

    html.guest-index-route .landing-hero.block:not(:has(.landing-hero-content)) > div {
      grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.08fr);
      align-items: center;
    }

    html.guest-index-route .landing-hero.block:not(:has(.landing-hero-content)) > div > div:first-child {
      order: 2;
      max-height: none;
      aspect-ratio: 4 / 3;
    }

    html.guest-index-route .landing-hero.block:not(:has(.landing-hero-content)) > div > div:last-child {
      order: 1;
    }
  }
</style>
<link rel="stylesheet" href="/styles/styles.css"/>
<script nonce="aem" src="/scripts/aem.js" type="module"></script>
<script nonce="aem" src="/scripts/scripts.js" type="module"></script>
